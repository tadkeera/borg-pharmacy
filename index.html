<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="صفحة استعلام مندوبي الأدوية عن جداول زياراتهم في صيدلية برج الأطباء" />
  <title>صيدلية برج الأطباء - إدارة الصيدلية</title>

  <!-- Tailwind CSS عبر CDN لتنسيق سريع وأنيق. توجد أنماط CSS داخلية أيضاً لضمان مظهر جيد عند تعذر تحميل CDN. -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase JS v2 عبر CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      color-scheme: light;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --secondary: #0f766e;
      --surface: rgba(255, 255, 255, 0.92);
      --border: rgba(148, 163, 184, 0.35);
      --text: #0f172a;
      --muted: #64748b;
      --danger: #b91c1c;
      --success: #047857;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(37, 99, 235, 0.20), transparent 34rem),
        radial-gradient(circle at bottom left, rgba(20, 184, 166, 0.16), transparent 30rem),
        linear-gradient(135deg, #eff6ff 0%, #f8fafc 52%, #ecfeff 100%);
    }

    .page-shell {
      width: min(100%, 980px);
      margin-inline: auto;
      padding: 22px 14px 34px;
    }

    .glass-card {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      backdrop-filter: blur(14px);
      border-radius: 28px;
    }

    .brand-logo {
      width: 136px;
      height: 136px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      margin-inline: auto;
      background: #fff;
      border: 4px solid rgba(29, 78, 216, 0.18);
      box-shadow: 0 18px 40px rgba(29, 78, 216, 0.18);
      overflow: hidden;
    }

    .brand-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .input-wrap { position: relative; }

    .search-input {
      width: 100%;
      min-height: 56px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      padding: 0 50px 0 16px;
      background: #fff;
      outline: none;
      font-size: 1rem;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .search-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.14);
    }

    .input-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
      pointer-events: none;
    }

    .suggestions {
      position: absolute;
      z-index: 40;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #dbe3ef;
      border-radius: 18px;
      box-shadow: 0 18px 44px rgba(15, 23, 42, 0.16);
      overflow: hidden;
      max-height: 292px;
      overflow-y: auto;
    }

    .suggestion-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 15px;
      border: 0;
      background: transparent;
      color: #0f172a;
      text-align: right;
      cursor: pointer;
      font: inherit;
    }

    .suggestion-item:hover,
    .suggestion-item:focus {
      background: #eff6ff;
      outline: none;
    }

    .message {
      border-radius: 18px;
      padding: 13px 15px;
      font-weight: 700;
      line-height: 1.75;
    }

    .message.info { color: #1d4ed8; background: #eff6ff; border: 1px solid #bfdbfe; }
    .message.warn { color: #92400e; background: #fffbeb; border: 1px solid #fde68a; }
    .message.error { color: #991b1b; background: #fef2f2; border: 1px solid #fecaca; }
    .message.success { color: #065f46; background: #ecfdf5; border: 1px solid #a7f3d0; }

    .result-card {
      background: #fff;
      border: 1px solid #dbeafe;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
    }

    .result-title {
      font-size: clamp(1.25rem, 4.5vw, 2rem);
      color: var(--primary-dark);
      font-weight: 900;
      line-height: 1.35;
      margin: 0 0 14px;
    }

    .schedule-list {
      list-style: none;
      padding: 0;
      margin: 16px 0;
      display: grid;
      gap: 10px;
    }

    .schedule-list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 13px 14px;
      border-radius: 16px;
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdfa 100%);
      border: 1px solid #dbeafe;
      line-height: 1.8;
    }

    .bullet-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--secondary);
      margin-top: 11px;
      flex: 0 0 auto;
    }

    .loading-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin-inline: 2px;
      border-radius: 999px;
      background: currentColor;
      animation: pulse 1s infinite ease-in-out;
    }
    .loading-dot:nth-child(2) { animation-delay: 160ms; }
    .loading-dot:nth-child(3) { animation-delay: 320ms; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    @media (max-width: 640px) {
      .page-shell { padding-top: 12px; }
      .glass-card { border-radius: 22px; }
      .brand-logo { width: 108px; height: 108px; }
      .result-card { padding: 16px; border-radius: 20px; }
      .schedule-list li { padding: 12px; }
    }
  </style>
</head>

  <script>
    /**********************************************************************
     * إعداد Supabase
     * ملاحظة مهمة: مفتاح anon آمن للنشر فقط عند تفعيل RLS ومنع الكتابة.
     **********************************************************************/
    const SUPABASE_URL = "https://dtkldxmfkhipdgiltzjl.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR0a2xkeG1ma2hpcGRnaWx0empsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNzY3NjIsImV4cCI6MjA5ODg1Mjc2Mn0.jXEUggNeO_tvt2lm7BRRbzm4p1eI-WZRvojLVdKn2fg";

    const registrationForm = document.getElementById("registrationForm");
    const representativeNameInput = document.getElementById("representativeName");
    const companyInput = document.getElementById("companySearch");
    const representativePhoneInput = document.getElementById("representativePhone");
    const suggestionsList = document.getElementById("suggestionsList");
    const saveButton = document.getElementById("saveButton");
    const searchPanel = document.getElementById("searchPanel");
    const representativeSummary = document.getElementById("representativeSummary");
    const lookupButton = document.getElementById("lookupButton");
    const resetRepresentativeButton = document.getElementById("resetRepresentativeButton");
    const conflictModal = document.getElementById("conflictModal");
    const conflictTitle = document.getElementById("conflictTitle");
    const conflictMessage = document.getElementById("conflictMessage");
    const conflictClose = document.getElementById("conflictClose");
    const statusBox = document.getElementById("statusBox");
    const results = document.getElementById("results");

    const REPRESENTATIVE_STORAGE_KEY = "borg_pharmacy_representative_profile_v1";
    const DEFAULT_COUNTRY_CODE = "+967";

    let db = null;
    let selectedCompany = null;
    let activeRepresentative = null;
    let latestAutocompleteRequest = 0;
    let autocompleteTimer = null;
    let companyNameColumn = "name"; // في قاعدة التطبيق الحالية اسم العمود هو name. إذا كان لديك company_name سيتم اكتشافه تلقائياً.

    /** حماية النصوص القادمة من قاعدة البيانات قبل طباعتها داخل HTML. */
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /** تهذيب بسيط للنص العربي للمقارنة فقط. */
    function normalizeArabic(value) {
      return String(value ?? "")
        .trim()
        .toLowerCase()
        .replace(/[\u064B-\u065F\u0670]/g, "")
        .replace(/[إأآٱ]/g, "ا")
        .replace(/ى/g, "ي")
        .replace(/ة/g, "ه")
        .replace(/ؤ/g, "و")
        .replace(/ئ/g, "ي")
        .replace(/[^\p{L}\p{N}]+/gu, " ")
        .replace(/\s+/g, " ");
    }

    /** منع أحرف wildcard غير المرغوبة داخل ilike قدر الإمكان. */
    function cleanSearchTerm(value) {
      return cleanCompanyName(value).replace(/[\%_]/g, " ").replace(/\s+/g, " ").trim();
    }

    function showStatus(type, html) {
      statusBox.className = `mt-5 message ${type}`;
      statusBox.innerHTML = html;
      statusBox.classList.remove("hidden");
    }

    function hideStatus() {
      statusBox.classList.add("hidden");
      statusBox.innerHTML = "";
    }

    function setButtonLoading(button, isLoading, idleText, loadingText = "جاري المعالجة") {
      button.disabled = isLoading;
      button.innerHTML = isLoading
        ? `${loadingText} <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>`
        : idleText;
    }

    function openSuggestions() {
      suggestionsList.classList.remove("hidden");
      companyInput.setAttribute("aria-expanded", "true");
    }

    function closeSuggestions() {
      suggestionsList.classList.add("hidden");
      suggestionsList.innerHTML = "";
      companyInput.setAttribute("aria-expanded", "false");
    }

    function renderSuggestionMessage(message) {
      suggestionsList.innerHTML = `<div class="px-4 py-3 text-sm font-bold text-slate-500">${escapeHtml(message)}</div>`;
      openSuggestions();
    }

    function cleanCompanyName(value) {
      return String(value ?? "").trim().replace(/^[\"'“”‘’]+|[\"'“”‘’]+$/g, "").trim();
    }

    function getCompanyDisplayName(row) {
      return cleanCompanyName(row?.name ?? row?.company_name ?? row?.[companyNameColumn] ?? "");
    }

    function companyKey(value) {
      return normalizeArabic(cleanCompanyName(value));
    }

    function uniqueValues(values) {
      return [...new Set((values || []).filter(Boolean))];
    }

    function buildCompanySearchTerms(term) {
      const cleaned = cleanSearchTerm(term);
      const withoutDashes = cleaned.replace(/[-–—]+/g, " ").replace(/\s+/g, " ").trim();
      const words = withoutDashes.split(" ").filter(word => word.length >= 3);
      return uniqueValues([
        cleaned,
        withoutDashes,
        words.slice(0, 2).join(" "),
        words[0]
      ]).filter(value => value.length >= 3);
    }

    function mergeAndDedupeCompanies(rows, typedTerm) {
      const typedKey = companyKey(typedTerm);
      const groups = new Map();

      (rows || []).forEach(row => {
        // لا نعرض السجلات المحذوفة حتى لو أعادتها سياسة قديمة في Supabase.
        if (row.deleted_at !== undefined && row.deleted_at !== null) return;

        const name = getCompanyDisplayName(row);
        const key = companyKey(name);
        if (!row.id || !name || !key) return;

        if (typedKey && !(key.includes(typedKey) || typedKey.includes(key))) return;

        const existing = groups.get(key);
        if (existing) {
          existing.ids = uniqueValues([...existing.ids, row.id]);
          existing.duplicateRows += 1;
        } else {
          groups.set(key, {
            id: row.id,
            ids: [row.id],
            name,
            key,
            duplicateRows: 1
          });
        }
      });

      return [...groups.values()]
        .sort((a, b) => a.name.localeCompare(b.name, "ar"))
        .slice(0, 8);
    }

    async function queryCompaniesByColumn(column, term) {
      // الأهم هنا: فلترة deleted_at = null حتى لا تظهر الشركات المحذوفة/القديمة في القائمة.
      let response = await db
        .from("companies")
        .select(`id, ${column}, deleted_at, updated_at`)
        .ilike(column, `%${term}%`)
        .is("deleted_at", null)
        .order(column, { ascending: true })
        .limit(50);

      // توافق احتياطي لو كانت قاعدة أخرى لا تحتوي deleted_at/updated_at.
      if (response.error && /deleted_at|updated_at/i.test(response.error.message || "")) {
        response = await db
          .from("companies")
          .select(`id, ${column}`)
          .ilike(column, `%${term}%`)
          .order(column, { ascending: true })
          .limit(50);
      }

      return response;
    }

    /**
     * الإكمال التلقائي:
     * يبحث في جدول companies عند إدخال 3 أحرف أو أكثر.
     * يتم حذف التكرار جذرياً عبر:
     * 1) استبعاد deleted_at من Supabase.
     * 2) دمج أي سجلات نشطة تحمل نفس الاسم بعد تنظيف علامات التنصيص والفواصل.
     * 3) حفظ كل IDs المدمجة لاستخدامها عند جلب الزيارات، حتى لا تضيع الزيارات لو كانت مرتبطة بأحد السجلات المتكررة.
     */
    async function fetchCompanySuggestions(term) {
      const searchTerms = buildCompanySearchTerms(term);
      const collectedRows = [];
      let lastError = null;

      for (const searchTerm of searchTerms) {
        let response = await queryCompaniesByColumn("name", searchTerm);

        if (response.error) {
          const fallback = await queryCompaniesByColumn("company_name", searchTerm);
          if (!fallback.error) {
            companyNameColumn = "company_name";
            response = fallback;
          }
        } else {
          companyNameColumn = "name";
        }

        if (response.error) {
          lastError = response.error;
          continue;
        }

        collectedRows.push(...(response.data || []));
      }

      if (!collectedRows.length && lastError) throw lastError;
      return mergeAndDedupeCompanies(collectedRows, term);
    }

    function renderSuggestions(companies) {
      if (!companies.length) {
        renderSuggestionMessage("لا توجد شركات مطابقة.");
        return;
      }

      suggestionsList.innerHTML = companies.map((company, index) => `
        <button class="suggestion-item" type="button" role="option" data-index="${index}">
          <span class="grid h-9 w-9 shrink-0 place-items-center rounded-xl bg-blue-50 text-blue-700" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
              <path d="M4 20V7.5A2.5 2.5 0 0 1 6.5 5h7A2.5 2.5 0 0 1 16 7.5V20M3 20h18M8 9h4M8 13h4M8 17h4M16 11h1.5A2.5 2.5 0 0 1 20 13.5V20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="font-extrabold">${escapeHtml(company.name)}</span>
        </button>
      `).join("");

      [...suggestionsList.querySelectorAll(".suggestion-item")].forEach((button) => {
        button.addEventListener("click", () => {
          selectedCompany = companies[Number(button.dataset.index)];
          companyInput.value = selectedCompany.name;
          closeSuggestions();
          hideStatus();
          results.innerHTML = "";
        });
      });

      openSuggestions();
    }

    function setupAutocomplete() {
      companyInput.addEventListener("input", () => {
        selectedCompany = null;
        results.innerHTML = "";
        hideStatus();
        clearTimeout(autocompleteTimer);

        const term = cleanSearchTerm(companyInput.value);
        if (term.length < 3) {
          closeSuggestions();
          return;
        }

        autocompleteTimer = setTimeout(async () => {
          const requestId = ++latestAutocompleteRequest;
          renderSuggestionMessage("جاري البحث عن الشركات...");

          try {
            const companies = await fetchCompanySuggestions(term);
            if (requestId !== latestAutocompleteRequest) return;
            renderSuggestions(companies);
          } catch (error) {
            console.error("Autocomplete error:", error);
            if (requestId !== latestAutocompleteRequest) return;
            renderSuggestionMessage("تعذر جلب نتائج الإكمال التلقائي.");
          }
        }, 320);
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".input-wrap")) closeSuggestions();
      });
    }

    function formatEpochDay(epochDay) {
      const numericEpoch = Number(epochDay);
      if (!Number.isFinite(numericEpoch)) return "غير محدد";
      const date = new Date(numericEpoch * 86400000);
      return date.toISOString().slice(0, 10);
    }

    function dayNameFromEpochDay(epochDay) {
      const numericEpoch = Number(epochDay);
      if (!Number.isFinite(numericEpoch)) return "غير محدد";
      const date = new Date(numericEpoch * 86400000);
      try {
        return new Intl.DateTimeFormat("ar", { weekday: "long", timeZone: "UTC" }).format(date);
      } catch (_) {
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        return days[date.getUTCDay()] || "غير محدد";
      }
    }

    function shiftLabel(value) {
      const shift = String(value ?? "").toUpperCase();
      if (shift === "MORNING") return "الفترة الصباحية";
      if (shift === "EVENING") return "الفترة المسائية";
      return value || "غير محدد";
    }

    function sortSchedules(schedules) {
      const shiftRank = value => {
        const shift = String(value ?? "").toUpperCase();
        if (shift.includes("صباحية") || shift === "MORNING") return 1;
        if (shift.includes("مسائية") || shift === "EVENING") return 2;
        return 3;
      };

      return [...schedules].sort((a, b) =>
        Number(a.weekNumber || 0) - Number(b.weekNumber || 0) ||
        String(a.date || "").localeCompare(String(b.date || "")) ||
        shiftRank(a.shiftTime) - shiftRank(b.shiftTime)
      );
    }

    function dedupeSchedules(schedules) {
      const unique = new Map();
      (schedules || []).forEach(row => {
        const key = [row.weekNumber, row.dayName, row.date, row.shiftTime].join("|");
        if (!unique.has(key)) unique.set(key, row);
      });
      return sortSchedules([...unique.values()]);
    }

    /**
     * محاولة جلب المواعيد من جدول/عرض schedules بالتنسيق المطلوب في المهمة.
     * إذا لم يكن schedules موجوداً، يتم الرجوع تلقائياً إلى جدول visits المستخدم في تطبيق Borg Pharmacy الحالي.
     */
    async function fetchSchedules(company) {
      const companyIds = uniqueValues(company?.ids?.length ? company.ids : [company?.id]);
      if (!companyIds.length) return [];

      const schedulesResponse = await db
        .from("schedules")
        .select("week_number, day_name, date, shift_time, company_id, company_name, slot_index")
        .in("company_id", companyIds)
        .order("week_number", { ascending: true })
        .order("date", { ascending: true })
        .order("slot_index", { ascending: true });

      if (!schedulesResponse.error) {
        return dedupeSchedules((schedulesResponse.data || []).map(row => ({
          weekNumber: row.week_number,
          dayName: row.day_name,
          date: row.date,
          shiftTime: row.shift_time
        })));
      }

      console.warn("schedules table/view unavailable; falling back to visits table:", schedulesResponse.error.message);

      let visitsResponse = await db
        .from("visits")
        .select("week_of_cycle, day_of_cycle, date_epoch_day, shift, slot_index, deleted_at")
        .in("company_id", companyIds)
        .is("deleted_at", null)
        .order("week_of_cycle", { ascending: true })
        .order("day_of_cycle", { ascending: true })
        .order("slot_index", { ascending: true });

      // إذا كان جدول visits في نسخة مبسطة لا يحتوي deleted_at، نجرب مرة أخرى بدونه.
      if (visitsResponse.error) {
        visitsResponse = await db
          .from("visits")
          .select("week_of_cycle, day_of_cycle, date_epoch_day, shift, slot_index")
          .in("company_id", companyIds)
          .order("week_of_cycle", { ascending: true })
          .order("day_of_cycle", { ascending: true })
          .order("slot_index", { ascending: true });
      }

      if (visitsResponse.error) throw visitsResponse.error;

      return dedupeSchedules((visitsResponse.data || []).map(row => ({
        weekNumber: row.week_of_cycle,
        dayName: dayNameFromEpochDay(row.date_epoch_day),
        date: formatEpochDay(row.date_epoch_day),
        shiftTime: shiftLabel(row.shift)
      })));
    }

    async function resolveCompanyFromInput(term) {
      const typedKey = companyKey(term);
      if (selectedCompany && selectedCompany.key === typedKey) {
        return selectedCompany;
      }

      const companies = await fetchCompanySuggestions(term);
      if (!companies.length) return null;

      return companies.find(company => company.key === typedKey) || companies[0];
    }

    function renderResults(company, schedules) {
      if (!schedules.length) {
        results.innerHTML = "";
        showStatus("warn", "لا توجد مواعيد لهذه الشركة.");
        return;
      }

      hideStatus();

      const rowsHtml = schedules.map(row => `
        <li>
          <span class="bullet-dot" aria-hidden="true"></span>
          <span>
            <strong>الأسبوع ${escapeHtml(row.weekNumber)}:</strong>
            (${escapeHtml(row.dayName)}) - (${escapeHtml(row.date)}) - ${escapeHtml(row.shiftTime)}
          </span>
        </li>
      `).join("");

      // تنسيق النتيجة مطابق للنص المطلوب في المهمة.
      results.innerHTML = `
        <article class="result-card">
          <h2 class="result-title">صيدلية برج الأطباء - إدارة الصيدلية</h2>
          <p class="text-lg leading-9"><strong>شركة:</strong> ${escapeHtml(company.name)}</p>
          <h3 class="mt-5 text-xl font-black text-slate-900">جدول الزيارات</h3>
          <ul class="schedule-list">${rowsHtml}</ul>
          <p class="mt-4 rounded-2xl bg-emerald-50 p-4 font-extrabold text-emerald-800 border border-emerald-100">
            يرجى الالتزام بالموعد المحدد.
          </p>
        </article>
      `;
    }

    function normalizePhoneInput(value) {
      const digits = String(value ?? "").replace(/\D/g, "");
      let local = digits;
      if (local.startsWith("967")) local = local.slice(3);
      if (local.startsWith("0")) local = local.slice(1);
      return `${DEFAULT_COUNTRY_CODE}${local}`;
    }

    function showConflict(title, message) {
      conflictTitle.textContent = title;
      conflictMessage.innerHTML = message;
      conflictModal.classList.remove("hidden");
      conflictModal.classList.add("flex");
    }

    function closeConflict() {
      conflictModal.classList.add("hidden");
      conflictModal.classList.remove("flex");
    }

    function saveRepresentativeProfile(profile) {
      localStorage.setItem(REPRESENTATIVE_STORAGE_KEY, JSON.stringify(profile));
    }

    function loadRepresentativeProfile() {
      try {
        const raw = localStorage.getItem(REPRESENTATIVE_STORAGE_KEY);
        if (!raw) return null;
        const profile = JSON.parse(raw);
        if (!profile?.id || !profile?.company?.id) return null;
        return profile;
      } catch (_) {
        return null;
      }
    }

    function showRegistrationForm() {
      activeRepresentative = null;
      registrationForm.classList.remove("hidden");
      searchPanel.classList.add("hidden");
      results.innerHTML = "";
      hideStatus();
    }

    function showSearchPanel(profile) {
      activeRepresentative = profile;
      registrationForm.classList.add("hidden");
      searchPanel.classList.remove("hidden");
      representativeSummary.innerHTML = `
        <div><strong>المندوب:</strong> ${escapeHtml(profile.name)}</div>
        <div><strong>رقم الجوال:</strong> <span dir="ltr">${escapeHtml(profile.phone)}</span></div>
        <div><strong>الشركة:</strong> ${escapeHtml(profile.company.name)}</div>
      `;
      results.innerHTML = "";
      hideStatus();
    }

    function buildConflictMessage(result) {
      return `
        البيانات موجودة بالفعل:<br>
        <strong>اسم المندوب:</strong> ${escapeHtml(result.rep_name || "غير محدد")}<br>
        <strong>رقم الجوال:</strong> <span dir="ltr">${escapeHtml(result.phone || "غير محدد")}</span><br>
        <strong>الشركة:</strong> ${escapeHtml(result.company_name || "غير محدد")}
      `;
    }

    async function handleRegistration(event) {
      event.preventDefault();
      closeSuggestions();
      results.innerHTML = "";
      hideStatus();

      const repName = cleanCompanyName(representativeNameInput.value);
      const phone = normalizePhoneInput(representativePhoneInput.value);

      if (repName.length < 3) {
        showStatus("warn", "يرجى إدخال اسم المندوب كاملاً.");
        return;
      }

      if (!selectedCompany || companyKey(companyInput.value) !== selectedCompany.key) {
        const resolved = await resolveCompanyFromInput(companyInput.value);
        if (!resolved) {
          showStatus("warn", "يرجى اختيار الشركة من القائمة المنسدلة بعد كتابة 3 أحرف أو أكثر.");
          return;
        }
        selectedCompany = resolved;
        companyInput.value = resolved.name;
      }

      if (phone.replace(/\D/g, "").length < 10) {
        showStatus("warn", "يرجى إدخال رقم جوال صحيح مع مفتاح البلد +967.");
        return;
      }

      try {
        representativePhoneInput.value = phone;
        setButtonLoading(saveButton, true, "حفظ", "جاري حفظ بيانات المندوب");
        showStatus("info", 'جاري حفظ بيانات المندوب <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>');

        const { data, error } = await db.rpc("register_representative_portal", {
          p_name: repName,
          p_phone: phone,
          p_company_id: selectedCompany.id
        });

        if (error) throw error;
        const result = Array.isArray(data) ? data[0] : data;

        if (!result || result.status !== "created") {
          const title = result?.status === "phone_exists"
            ? "رقم الجوال مسجل مسبقاً"
            : "اسم المندوب مسجل مسبقاً";
          showConflict(title, buildConflictMessage(result || {}));
          showStatus("warn", "لم يتم الحفظ لأن بيانات المندوب مسجلة مسبقاً.");
          return;
        }

        const profile = {
          id: result.representative_id,
          name: result.rep_name,
          phone: result.phone,
          company: {
            id: result.company_id,
            ids: uniqueValues([result.company_id, ...(selectedCompany.ids || [])]),
            name: result.company_name,
            key: companyKey(result.company_name)
          },
          savedAt: new Date().toISOString()
        };

        saveRepresentativeProfile(profile);
        showSearchPanel(profile);
        showStatus("success", "تم حفظ بيانات المندوب بنجاح. يمكنك الآن الضغط على بحث لعرض جدول الزيارات.");
      } catch (error) {
        console.error("Registration error:", error);
        showStatus("error", "حدث خطأ أثناء حفظ بيانات المندوب. تأكد من تنفيذ ملف SQL الخاص بصفحة الاستعلامات في Supabase.");
      } finally {
        setButtonLoading(saveButton, false, "حفظ");
      }
    }

    async function logRepresentativeSearch(profile) {
      try {
        await db.rpc("log_representative_portal_search", {
          p_representative_id: profile.id,
          p_company_id: profile.company.id
        });
      } catch (error) {
        console.warn("Unable to log representative search:", error);
      }
    }

    async function handleLookup() {
      if (!activeRepresentative) {
        showRegistrationForm();
        return;
      }

      try {
        setButtonLoading(lookupButton, true, "بحث", "جاري البحث عن جدول الزيارات");
        showStatus("info", 'جاري البحث عن جدول الزيارات <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>');
        await logRepresentativeSearch(activeRepresentative);
        const schedules = await fetchSchedules(activeRepresentative.company);
        renderResults(activeRepresentative.company, schedules);
      } catch (error) {
        console.error("Lookup error:", error);
        results.innerHTML = "";
        showStatus("error", "حدث خطأ أثناء البحث. تأكد من الاتصال بالإنترنت ومن صلاحيات Supabase.");
      } finally {
        setButtonLoading(lookupButton, false, "بحث");
      }
    }

    function init() {
      if (!window.supabase?.createClient) {
        showStatus("error", "تعذر تحميل مكتبة Supabase. يرجى التأكد من اتصال الإنترنت ثم إعادة تحميل الصفحة.");
        saveButton.disabled = true;
        lookupButton.disabled = true;
        return;
      }

      db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false }
      });

      setupAutocomplete();
      registrationForm.addEventListener("submit", handleRegistration);
      lookupButton.addEventListener("click", handleLookup);
      conflictClose.addEventListener("click", closeConflict);
      conflictModal.addEventListener("click", (event) => { if (event.target === conflictModal) closeConflict(); });
      resetRepresentativeButton.addEventListener("click", () => {
        localStorage.removeItem(REPRESENTATIVE_STORAGE_KEY);
        representativeNameInput.value = "";
        companyInput.value = "";
        representativePhoneInput.value = DEFAULT_COUNTRY_CODE;
        selectedCompany = null;
        showRegistrationForm();
      });

      const savedProfile = loadRepresentativeProfile();
      if (savedProfile) showSearchPanel(savedProfile);
      else showRegistrationForm();
    }

    init();
  </script>
</body>
</html>
