name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore if secrets exist
        if: ${{ secrets.BORG_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p keystore
          echo "${{ secrets.BORG_KEYSTORE_BASE64 }}" | base64 --decode > keystore/borg-release.jks
          cat > keystore.properties <<EOF
          storeFile=keystore/borg-release.jks
          storePassword=${{ secrets.BORG_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.BORG_KEY_ALIAS }}
          keyPassword=${{ secrets.BORG_KEY_PASSWORD }}
          EOF

      - name: Build release APK
        run: ./gradlew clean assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: borg-pharmacy-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release APK on tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
