name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # The release signing keystore + keystore.properties are committed to the
    # repo, so every CI build produces an APK signed with the SAME key as
    # local builds. This keeps the digital signature consistent across releases.
    - name: Build signed Release APK
      run: ./gradlew assembleRelease

    - name: Verify APK is signed
      run: |
        $ANDROID_HOME/build-tools/34.0.0/apksigner verify --print-certs \
          app/build/outputs/apk/release/app-release.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/heads/')
      with:
        # Output is now the SIGNED apk: app-release.apk (not *-unsigned*)
        files: app/build/outputs/apk/release/app-release.apk
        tag_name: "v1.1.${{ github.run_number }}"
        name: "Release v1.1.${{ github.run_number }}"
        body: |
          ✅ Signed, installable release.
          Fixes "App not installed as package appears to be invalid" — the APK
          is now digitally signed with the project release key.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
