name: Android CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      BORG_KEYSTORE_BASE64: ${{ secrets.BORG_KEYSTORE_BASE64 }}
      BORG_KEYSTORE_PASSWORD: ${{ secrets.BORG_KEYSTORE_PASSWORD }}
      BORG_KEY_ALIAS: ${{ secrets.BORG_KEY_ALIAS }}
      BORG_KEY_PASSWORD: ${{ secrets.BORG_KEY_PASSWORD }}
      SUPABASE_SYNC_TOKEN: ${{ secrets.SUPABASE_SYNC_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore when repository secrets exist
        run: |
          if [ -n "$BORG_KEYSTORE_BASE64" ]; then
            mkdir -p keystore
            printf '%s' "$BORG_KEYSTORE_BASE64" | base64 --decode > keystore/borg-release.jks
            cat > keystore.properties <<EOF
          storeFile=keystore/borg-release.jks
          storePassword=$BORG_KEYSTORE_PASSWORD
          keyAlias=$BORG_KEY_ALIAS
          keyPassword=$BORG_KEY_PASSWORD
          EOF
          else
            echo "Release signing secrets are not configured; Gradle will use debug signing fallback for CI artifact only."
          fi

      - name: Build release APK
        run: ./gradlew clean assembleRelease --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: borg-pharmacy-release-apk
          path: app/build/outputs/apk/release/*.apk

      - name: Publish GitHub Release APK on tags
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
